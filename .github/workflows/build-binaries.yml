name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string
      source_ref:
        description: 'Source ref to build/publish (defaults to tag; use only for release recovery)'
        required: false
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      SOURCE_REF: ${{ github.event.inputs.source_ref || github.event.inputs.tag || github.ref_name }}
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || format('{0}/homebrew-deepseek-helmsman', github.repository_owner) }}
      HOMEBREW_TAP_NAME: ${{ vars.HOMEBREW_TAP_NAME || format('{0}/deepseek-helmsman', github.repository_owner) }}
      HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH || 'main' }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Verify Homebrew tap access
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update ${HOMEBREW_TAP_REPOSITORY}."
            exit 1
          fi
          gh repo view "${HOMEBREW_TAP_REPOSITORY}" --json nameWithOwner >/dev/null
          tap_remote="https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git"
          tap_dir="$(mktemp -d)"
          trap 'rm -rf "${tap_dir}"' EXIT
          git clone --depth 1 --branch "${HOMEBREW_TAP_BRANCH}" "${tap_remote}" "${tap_dir}"
          git -C "${tap_dir}" push --dry-run origin HEAD:refs/heads/deepseek-helmsman-token-check

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${RELEASE_TAG}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          
          # Extract changelog section for this version
          cd packages/coding-agent
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          
          # If empty, use a default message
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${VERSION}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries
          
          # Create release with changelog notes (or update if exists)
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            deepseek-helmsman-darwin-arm64.tar.gz \
            deepseek-helmsman-darwin-x64.tar.gz \
            deepseek-helmsman-linux-x64.tar.gz \
            deepseek-helmsman-linux-arm64.tar.gz \
            deepseek-helmsman-windows-x64.zip \
            deepseek-helmsman-windows-arm64.zip \
            2>/dev/null || \
          gh release upload "${RELEASE_TAG}" \
            deepseek-helmsman-darwin-arm64.tar.gz \
            deepseek-helmsman-darwin-x64.tar.gz \
            deepseek-helmsman-linux-x64.tar.gz \
            deepseek-helmsman-linux-arm64.tar.gz \
            deepseek-helmsman-windows-x64.zip \
            deepseek-helmsman-windows-arm64.zip \
            --clobber

      - name: Update Homebrew tap
        run: |
          VERSION="${RELEASE_TAG#v}"
          bun scripts/update-homebrew-tap.mjs \
            --archive-dir packages/coding-agent/binaries \
            --repository "${GITHUB_REPOSITORY}" \
            --version "${VERSION}" \
            --tag "${RELEASE_TAG}" \
            --tap-repository "${HOMEBREW_TAP_REPOSITORY}" \
            --tap-branch "${HOMEBREW_TAP_BRANCH}"

  homebrew-smoke:
    runs-on: macos-latest
    needs: build
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || format('{0}/homebrew-deepseek-helmsman', github.repository_owner) }}
      HOMEBREW_TAP_NAME: ${{ vars.HOMEBREW_TAP_NAME || format('{0}/deepseek-helmsman', github.repository_owner) }}
      HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH || 'main' }}
    steps:
      - name: Install release from Homebrew tap
        run: |
          set -euo pipefail
          expected_version="${RELEASE_TAG#v}"

          brew update
          brew uninstall --force deepseek-helmsman || true
          brew untap "${HOMEBREW_TAP_NAME}" || true
          brew tap "${HOMEBREW_TAP_NAME}" "https://github.com/${HOMEBREW_TAP_REPOSITORY}.git"
          tap_dir="$(brew --repo "${HOMEBREW_TAP_NAME}")"
          git -C "${tap_dir}" fetch origin "${HOMEBREW_TAP_BRANCH}"
          git -C "${tap_dir}" checkout "${HOMEBREW_TAP_BRANCH}"
          brew cleanup -s deepseek-helmsman || true

          HOMEBREW_NO_AUTO_UPDATE=1 brew install "${HOMEBREW_TAP_NAME}/deepseek-helmsman"

          brew test "${HOMEBREW_TAP_NAME}/deepseek-helmsman"
          test "$(brew list --versions deepseek-helmsman | awk '{print $2}')" = "${expected_version}"
          actual_version="$(deepseek-helmsman --version)"
          test "${actual_version}" = "${expected_version}"
          deepseek-helmsman --help
          deepseek-helmsman --list-models
